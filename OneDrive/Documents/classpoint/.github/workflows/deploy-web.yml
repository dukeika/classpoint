name: Deploy Web App to ECR

on:
  push:
    branches: [master]
    paths:
      - 'my-turborepo/apps/web/**'
      - 'my-turborepo/packages/**'
      - 'my-turborepo/pnpm-lock.yaml'
      - 'my-turborepo/turbo.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Build and Deploy to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: classpoint-web
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd my-turborepo
          echo "Building Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f apps/web/Dockerfile .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Pushing Docker image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Image pushed successfully!"
          echo "Image URI: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Wait for App Runner deployment
        run: |
          echo "App Runner will automatically deploy the new image."
          echo "Monitor deployment at: https://eu-west-2.console.aws.amazon.com/apprunner/home?region=eu-west-2#/services"
          echo "Service URL: https://g2genquvfp.eu-west-2.awsapprunner.com"
