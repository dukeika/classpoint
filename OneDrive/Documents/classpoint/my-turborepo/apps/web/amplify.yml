version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd ../..
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - cd apps/web
        - pnpm build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/web/node_modules/**/*
      - apps/web/.next/cache/**/*
