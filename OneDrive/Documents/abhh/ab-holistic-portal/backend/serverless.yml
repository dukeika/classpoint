service: ab-holistic-interview-portal

frameworkVersion: '>=3.0.0 <5.0.0'

provider:
  name: aws
  runtime: nodejs18.x
  region: ${opt:region, 'us-west-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 30
  tracing:
    lambda: ${self:custom.environmentConfig.enableXRay}
  apiGateway:
    minimumCompressionSize: 1024
    binaryMediaTypes:
      - '*/*'

  environment:
    STAGE: ${self:provider.stage}
    REGION: ${self:provider.region}
    JOBS_TABLE: ${self:custom.tablesNames.jobs}
    APPLICANTS_TABLE: ${self:custom.tablesNames.applicants}
    APPLICATIONS_TABLE: ${self:custom.tablesNames.applications}
    TESTS_TABLE: ${self:custom.tablesNames.tests}
    TEST_SUBMISSIONS_TABLE: ${self:custom.tablesNames.testSubmissions}
    NOTIFICATIONS_TABLE: ${self:custom.tablesNames.notifications}
    S3_BUCKET_RESUMES: ${self:custom.bucketNames.resumes}
    S3_BUCKET_VIDEOS: ${self:custom.bucketNames.videos}
    USER_POOL_ID: ${self:custom.cognitoUserPoolId}
    COGNITO_USER_POOL_ID: ${self:custom.cognitoUserPoolId}
    COGNITO_USER_POOL_WEB_CLIENT_ID: ${self:custom.cognitoUserPoolWebClientId}
    COGNITO_USER_POOL_DOMAIN: ${self:custom.cognitoUserPoolDomain}
    COGNITO_HOSTED_UI_URL: ${self:custom.cognitoHostedUIUrl}
    JWT_SECRET: ${self:custom.jwtSecret}
    VERIFY_WITH_COGNITO: ${self:custom.environmentConfig.verifyWithCognito}
    CORS_ORIGINS: ${self:custom.corsOrigins}
    LOG_LEVEL: ${self:custom.environmentConfig.logLevel}
    SES_FROM_EMAIL: ${self:custom.environmentConfig.sesFromEmail}
    SESSION_TIMEOUT_MINUTES: ${self:custom.environmentConfig.sessionTimeoutMinutes}
    RATE_LIMIT_PER_MINUTE: ${self:custom.rateLimitPerMinute}
    _X_AMZN_TRACE_ID: !Ref "AWS::NoValue"

  iam:
    role:
      statements:
        # DynamoDB permissions
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.jobs}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.applicants}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.applications}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.tests}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.testSubmissions}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.notifications}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.jobs}/index/*"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.tablesNames.applications}/index/*"

        # S3 permissions
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:GetObjectVersion
          Resource:
            - "arn:aws:s3:::${self:custom.bucketNames.resumes}/*"
            - "arn:aws:s3:::${self:custom.bucketNames.videos}/*"
          Condition:
            StringEquals:
              "s3:x-amz-server-side-encryption": "AES256"
            Bool:
              "aws:SecureTransport": "true"

        # S3 bucket list permissions (minimal)
        - Effect: Allow
          Action:
            - s3:ListBucket
            - s3:GetBucketLocation
          Resource:
            - "arn:aws:s3:::${self:custom.bucketNames.resumes}"
            - "arn:aws:s3:::${self:custom.bucketNames.videos}"

        # Cognito permissions
        - Effect: Allow
          Action:
            - cognito-idp:AdminGetUser
            - cognito-idp:AdminUpdateUserAttributes
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:ListUsers
            - cognito-idp:GetUser
          Resource:
            - "arn:aws:cognito-idp:${self:provider.region}:*:userpool/${self:custom.cognitoUserPoolId}"

        # SES permissions
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource:
            - "arn:aws:ses:${self:provider.region}:*:identity/${self:custom.environmentConfig.sesFromEmail}"
            - "arn:aws:ses:${self:provider.region}:*:identity/abholisticportal.com"
          Condition:
            StringEquals:
              "ses:FromAddress": "${self:custom.environmentConfig.sesFromEmail}"

        # SNS permissions
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: "arn:aws:sns:${self:provider.region}:*:ab-holistic-*"

        # CloudWatch Logs permissions
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource:
            - "arn:aws:logs:${self:provider.region}:*:log-group:/aws/lambda/ab-holistic-interview-portal-${self:provider.stage}-*"

        # X-Ray permissions
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"
          Condition:
            StringEquals:
              "aws:RequestedRegion": "${self:provider.region}"

# plugins:
  # - serverless-offline
  # - serverless-plugin-tracing
  # - serverless-plugin-warmup

custom:
  # Table names
  tablesNames:
    jobs: ${self:service}-jobs-${self:provider.stage}
    applicants: ${self:service}-applicants-${self:provider.stage}
    applications: ${self:service}-applications-${self:provider.stage}
    tests: ${self:service}-tests-${self:provider.stage}
    testSubmissions: ${self:service}-test-submissions-${self:provider.stage}
    notifications: ${self:service}-notifications-${self:provider.stage}

  # S3 bucket names (use existing buckets with account ID)
  bucketNames:
    resumes: ${self:service}-resumes-${self:provider.stage}-032397978068
    videos: ${self:service}-videos-${self:provider.stage}-032397978068

  # Cognito configuration
  cognitoUserPoolId: ${env:COGNITO_USER_POOL_ID, 'us-west-1_n0Ij4uUuB'}
  cognitoUserPoolWebClientId: ${env:COGNITO_USER_POOL_WEB_CLIENT_ID, '742a4q83obkfejdod7d1retvep'}
  cognitoUserPoolDomain: ${env:COGNITO_USER_POOL_DOMAIN, 'ab-holistic-portal'}
  cognitoHostedUIUrl: ${env:COGNITO_HOSTED_UI_URL, 'https://ab-holistic-portal.auth.us-west-1.amazoncognito.com'}

  # JWT Secret
  jwtSecret: ${env:JWT_SECRET, 'super-secure-jwt-secret-for-production-ab-holistic-2024'}

  # CORS Configuration - Updated to support CloudFront and all deployment origins
  corsOrigins: ${env:CORS_ORIGINS, '*'}

  # Rate Limiting
  rateLimitPerMinute: ${env:RATE_LIMIT_REQUESTS_PER_MINUTE, '100'}

  # Environment specific configurations
  environmentConfig:
    logLevel: ${env:LOG_LEVEL, 'info'}
    enableXRay: ${env:ENABLE_X_RAY, 'false'}
    sesFromEmail: ${env:SES_FROM_EMAIL, 'noreply@abholisticportal.com'}
    sessionTimeoutMinutes: ${env:SESSION_TIMEOUT_MINUTES, '30'}
    enableWarmup: ${env:ENABLE_WARMUP, 'false'}
    alertEmail: ${env:ALERT_EMAIL, 'admin@abholisticportal.com'}
    verifyWithCognito: ${env:VERIFY_WITH_COGNITO, 'true'}

  # DynamoDB Configuration
  dynamoDbBillingMode: PAY_PER_REQUEST
  dynamoDbAutoScaling: false

  # Serverless offline configuration
  serverless-offline:
    httpPort: 3001
    lambdaPort: 3002

  # Warmup configuration
  warmup:
    default:
      enabled: ${self:custom.environmentConfig.enableWarmup, false}
      events:
        - schedule: rate(5 minutes)
      timeout: 20
      prewarm: true
      cleanFolder: false
      memorySize: 256
      name: ${self:service}-${self:provider.stage}-warmup-plugin
      role: ${self:service}-${self:provider.stage}-warmup-plugin-role

  # Tracing configuration
  tracing:
    apiGateway: ${self:custom.environmentConfig.enableXRay}
    lambda: ${self:custom.environmentConfig.enableXRay}

functions:
  # Authentication functions
  login:
    handler: src/functions/auth/login.handler
    events:
      - http:
          path: /auth/login
          method: post
          cors:
            origin: ${self:custom.corsOrigins}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
              - X-Requested-With
            allowCredentials: true

  register:
