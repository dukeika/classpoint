name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  AWS_REGION: us-west-1
  AMPLIFY_REGION: us-east-1

jobs:
  # Pre-deployment validation
  pre-deployment-check:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate package versions
        run: |
          echo "Validating package.json versions..."
          FRONTEND_VERSION=$(jq -r '.version' frontend/package.json)
          BACKEND_VERSION=$(jq -r '.version' backend/package.json)
          echo "Frontend version: $FRONTEND_VERSION"
          echo "Backend version: $BACKEND_VERSION"

      - name: Check for security vulnerabilities
        run: |
          cd frontend && npm audit --audit-level=critical
          cd ../backend && npm audit --audit-level=critical

      - name: Verify environment secrets
        run: |
          if [[ -z "${{ secrets.PROD_COGNITO_USER_POOL_ID }}" ]]; then
            echo "Missing PROD_COGNITO_USER_POOL_ID secret"
            exit 1
          fi
          echo "All required secrets are configured"

  deploy-backend:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    needs: pre-deployment-check
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Run final tests
        run: npm test

      - name: Deploy backend services
        run: npm run deploy:prod
        env:
          COGNITO_USER_POOL_ID: ${{ secrets.PROD_COGNITO_USER_POOL_ID }}
          JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}

      - name: Wait for deployment completion
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 60

      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ab-holistic-interview-portal-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`ServiceEndpoint`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health check backend
        run: |
          curl -f "${{ steps.get-api-url.outputs.api_url }}/health" || exit 1

    outputs:
      api_url: ${{ steps.get-api-url.outputs.api_url }}

  deploy-frontend:
    name: Deploy Frontend to Production
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AMPLIFY_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build frontend for production
        run: npm run build
        env:
          NEXT_PUBLIC_AWS_REGION: ${{ env.AWS_REGION }}
          NEXT_PUBLIC_USER_POOL_ID: ${{ secrets.PROD_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_USER_POOL_WEB_CLIENT_ID: ${{ secrets.PROD_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_IDENTITY_POOL_ID: ${{ secrets.PROD_COGNITO_IDENTITY_POOL_ID }}
          NEXT_PUBLIC_API_ENDPOINT: ${{ needs.deploy-backend.outputs.api_url }}
          NEXT_PUBLIC_S3_BUCKET: ${{ secrets.PROD_S3_BUCKET }}
          NODE_ENV: production

      - name: Deploy to Amplify
        run: npm run deploy:prod
        env:
          AMPLIFY_APP_ID: ${{ secrets.PROD_AMPLIFY_APP_ID }}

      - name: Wait for frontend deployment
        run: |
          echo "Waiting for frontend deployment to complete..."
          sleep 90

  production-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run production smoke tests
        run: |
          cd frontend
          npm run test:smoke:prod
        env:
          TEST_BASE_URL: https://portal.abholistic.com
          TEST_API_URL: ${{ needs.deploy-backend.outputs.api_url }}

      - name: Test critical user journeys
        run: |
          cd frontend
          npm run test:critical-path
        env:
          TEST_BASE_URL: https://portal.abholistic.com

  # Security scan post-deployment
  security-validation:
    name: Post-deployment Security Scan
    runs-on: ubuntu-latest
    needs: [deploy-frontend]

    steps:
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'https://portal.abholistic.com'
          rules_file_name: '.zap/rules.tsv'

      - name: SSL Labs Test
        run: |
          # Test SSL configuration
          curl -s "https://api.ssllabs.com/api/v3/analyze?host=portal.abholistic.com&publish=off&all=done" | jq '.grade'

  # Deployment verification and rollback
  deployment-verification:
    name: Verify Deployment Success
    runs-on: ubuntu-latest
    needs: [production-tests, security-validation]

    steps:
      - name: Verify all services
        run: |
          echo "Verifying deployment success..."

          # Check frontend accessibility
          curl -f https://portal.abholistic.com

          # Check API health
          curl -f "${{ needs.deploy-backend.outputs.api_url }}/health"

          echo "Deployment verification complete!"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes in this Release
            - Deployed to production successfully
            - Backend API: ${{ needs.deploy-backend.outputs.api_url }}
            - Frontend URL: https://portal.abholistic.com

            ## Deployment Information
            - Commit: ${{ github.sha }}
            - Deployed by: ${{ github.actor }}
            - Deployment time: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false

  # Notification and monitoring setup
  post-deployment:
    name: Post-deployment Tasks
    runs-on: ubuntu-latest
    needs: deployment-verification
    if: always()

    steps:
      - name: Update monitoring dashboards
        run: |
          echo "Production deployment completed"
          echo "Setting up monitoring alerts..."

      - name: Notify stakeholders
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://portal.abholistic.com',
              description: 'Successfully deployed to production',
              context: 'deployment/production'
            });

      - name: Send success notification
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          username: 'GitHub Actions'
          text: |
            🚀 **Production Deployment Successful!**

            **Details:**
            - Repository: ${{ github.repository }}
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            - Frontend: https://portal.abholistic.com
            - API: ${{ needs.deploy-backend.outputs.api_url }}

            **Time:** $(date -u)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send failure notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          username: 'GitHub Actions'
          text: |
            🚨 **Production Deployment Failed!**

            **Details:**
            - Repository: ${{ github.repository }}
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            - Failed Job: ${{ github.job }}

            Please investigate immediately and consider rollback if necessary.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}